<script>
// ==============================
// REQUIRED HELPER FUNCTIONS
// ==============================

function confirmReset(){
  if(confirm("Reset calibration?")){
    localStorage.removeItem("_fc1");
    location.reload();
  }
}


function drawHeatmap(lm, ctx, canvas) {
  for (let i = 0; i < lm.length; i++) {
    const p = lm[i];

    const intensity = Math.min(Math.abs(p.z) * 50, 1);

    const x = p.x * canvas.width;
    const y = p.y * canvas.height;

    const r = Math.floor(255 * intensity);
    const g = Math.floor(255 * (1 - intensity));

    ctx.beginPath();
    ctx.arc(x, y, 2, 0, 2 * Math.PI);
    ctx.fillStyle = `rgb(${r},${g},0)`;
    ctx.fill();
  }
}

function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function speakFeedback(feedback) {
  const msg = feedback.join(", ");
  if (msg) speak(msg);
}

function guideStep() {
  const step = STEPS[stepIndex];

  if (step === "LEFT") speak("Puff your left cheek");
  else if (step === "RIGHT") speak("Puff your right cheek");
  else if (step === "FULL") speak("Puff both cheeks");
  else if (step === "UPPER_LIP") speak("Puff your upper lip");
  else if (step === "LOWER_LIP") speak("Puff your lower lip");
}

function generateFeedback(values, state) {
  return []; // keep simple for now
}

</script>
